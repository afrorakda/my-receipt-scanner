<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>レシート即取り</title>
    <script src='https://unpkg.com/tesseract.js@v5.0.0/dist/tesseract.min.js'></script>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        #cameraInput { margin: 20px 0; }
        #amountInput { width: 90%; padding: 15px; font-size: 24px; border: 2px solid #ccc; }
        .status { color: #666; margin: 10px; }
    </style>
</head>
<body>
    <h1>レシート読み取り</h1>
    <input type="file" id="cameraInput" accept="image/*" capture="environment">
    <div id="status" class="status">レシートを撮影してください</div>
    <input type="number" id="amountInput" placeholder="金額">
    <button onclick="alert('保存しました！')">確定</button>

    <script>
        const cameraInput = document.getElementById('cameraInput');
        const amountInput = document.getElementById('amountInput');
        const status = document.getElementById('status');

        cameraInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            status.innerText = '解析中...（少し時間がかかります）';

            // 画像を文字認識
            const { data: { text } } = await Tesseract.recognize(file, 'jpn+eng');
            
            // 正規表現で「合計」や「¥」に近い数字を抽出するロジック（簡易版）
            const matches = text.match(/(\d{1,3},?\d{3})/); 
            if (matches) {
                amountInput.value = matches[0].replace(',', '');
                status.innerText = '読み取り完了！修正があればどうぞ。';
            } else {
                status.innerText = '金額が読み取れませんでした。手入力してください。';
            }
        });
    </script>
</body>
</html>
